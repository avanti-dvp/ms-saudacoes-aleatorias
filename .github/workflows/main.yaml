name: CI/CD - Saudações Aleatórias

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_USER: zozores99
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_USER || 'zozores99' }}/ms-saudacoes-aleatorias
  DOCKER_IMAGE_TAG: 1.0.${{ github.run_id }}
  SERVICE_NAME: saudacoes-aleatorias

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go Fmt & Vet
        run: |
          echo "Linting and formatting code..."
          go fmt ./...
          go vet ./...
          echo "Code linting and formatting completed."
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --verbose